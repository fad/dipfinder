<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Test - DipFinder</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        .gradient-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .reset-container {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="reset-container p-8 rounded-xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <div class="mb-4">
                <h1 class="text-3xl font-bold text-gray-800">DipFinder</h1>
                <div class="w-16 h-1 bg-gradient-to-r from-blue-500 to-purple-600 mx-auto mt-2 rounded"></div>
            </div>
            <h2 class="text-xl font-semibold text-gray-700">Password Reset - Visual Test</h2>
            <p class="text-gray-600 mt-2">This page tests the visual styling</p>
        </div>
        
        <div class="bg-green-50 border-l-4 border-green-400 p-4 mb-6 rounded">
            <div class="flex">
                <div class="text-green-400">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="ml-3">
                    <p class="text-sm text-green-700">Success message styling test</p>
                </div>
            </div>
        </div>
        
        <div class="bg-red-50 border-l-4 border-red-400 p-4 mb-6 rounded">
            <div class="flex">
                <div class="text-red-400">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <div class="ml-3">
                    <p class="text-sm text-red-700">Error message styling test</p>
                </div>
            </div>
        </div>
        
        <form class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-lock mr-2"></i>Sample Input Field
                </label>
                <input type="text" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" 
                       placeholder="Test input styling" value="Sample text">
            </div>
            
            <button type="button" 
                    class="w-full gradient-btn text-white py-3 px-4 rounded-lg font-medium hover:opacity-90 transition-all">
                <i class="fas fa-key mr-2"></i>Sample Button
            </button>
        </form>
        
        <div class="text-center mt-8">
            <a href="reset-password.html?token=test" class="text-blue-600 hover:text-blue-800 text-sm font-medium transition-colors">
                <i class="fas fa-arrow-right mr-2"></i>Go to Actual Reset Page
            </a>
        </div>
    </div>
</body>
</html>
