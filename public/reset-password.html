<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Dip Finder</title>
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/styles/styles.css">
    <style>
        .strength-weak   { color: #dc2626; font-size: 0.8rem; margin-top: 0.35rem; }
        .strength-medium { color: #d97706; font-size: 0.8rem; margin-top: 0.35rem; }
        .strength-strong { color: #059669; font-size: 0.8rem; margin-top: 0.35rem; }
    </style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
    <div class="reset-container w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden">

        <!-- Gradient header -->
        <div class="bg-gradient-to-br from-blue-600 via-indigo-600 to-violet-700 px-8 py-6 text-white">
            <a href="/app" class="mb-5 flex items-center gap-2.5 no-underline w-fit">
                <picture>
                    <source srcset="/img/logo.avif" type="image/avif">
                    <img src="/img/logo.png" width="28" height="28" alt="Dip Finder logo" style="border-radius:6px;">
                </picture>
                <span class="text-sm font-extrabold tracking-wide">Dip Finder</span>
            </a>
            <h1 id="page-title" class="text-xl font-bold mt-4">Reset your password</h1>
            <p id="page-subtitle" class="text-sm text-blue-100 mt-1">Enter your new password below.</p>
        </div>

        <!-- Body -->
        <div class="px-8 py-7 space-y-5">

            <div id="loading-message" class="hidden flex items-center gap-3 text-sm text-gray-500">
                <div class="h-5 w-5 animate-spin rounded-full border-2 border-blue-600 border-t-transparent"></div>
                <span>Verifying reset link...</span>
            </div>

            <div id="error-message" class="hidden rounded-xl border border-red-100 bg-red-50 px-4 py-3">
                <p class="flex items-start gap-2 text-sm text-red-700">
                    <i class="fas fa-exclamation-circle mt-0.5 flex-shrink-0 text-red-400"></i>
                    <span id="error-text"></span>
                </p>
            </div>

            <div id="success-message" class="hidden rounded-xl border border-green-100 bg-green-50 px-4 py-3">
                <p class="flex items-start gap-2 text-sm text-green-700">
                    <i class="fas fa-check-circle mt-0.5 flex-shrink-0 text-green-400"></i>
                    <span id="success-text"></span>
                </p>
            </div>

            <form id="reset-form" class="space-y-5">
                <div>
                    <label for="new-password" class="mb-1.5 block text-xs font-semibold uppercase tracking-wide text-gray-500">
                        New Password
                    </label>
                    <input type="password" id="new-password"
                        class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm transition focus:border-blue-500 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-100"
                        placeholder="Create a new password" required>
                    <div id="password-strength" class="hidden"></div>
                </div>

                <div>
                    <label for="repeat-password" class="mb-1.5 block text-xs font-semibold uppercase tracking-wide text-gray-500">
                        Confirm Password
                    </label>
                    <input type="password" id="repeat-password"
                        class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm transition focus:border-blue-500 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-100"
                        placeholder="Confirm your new password" required>
                    <div id="password-match" class="hidden"></div>
                </div>

                <button type="submit" id="reset-btn"
                    class="gradient-btn w-full rounded-xl px-4 py-3 font-semibold text-white transition-all hover:opacity-90">
                    <i class="fas fa-key mr-2"></i><span id="btn-label">Reset Password</span>
                </button>
            </form>

            <div class="text-center" id="static-back-button">
                <a href="/app" class="text-sm text-gray-400 transition hover:text-gray-600">
                    <i class="fas fa-arrow-left mr-1 text-xs"></i>Back to sign in
                </a>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let resetToken = urlParams.get('token');
        const setupToken = urlParams.get('setup');
        const isSetupMode = !!setupToken;

        const form = document.getElementById('reset-form');
        const errorDiv = document.getElementById('error-message');
        const successDiv = document.getElementById('success-message');
        const loadingDiv = document.getElementById('loading-message');
        const errorText = document.getElementById('error-text');
        const successText = document.getElementById('success-text');
        const resetBtn = document.getElementById('reset-btn');
        const newPasswordInput = document.getElementById('new-password');
        const repeatPasswordInput = document.getElementById('repeat-password');
        const passwordStrengthDiv = document.getElementById('password-strength');
        const passwordMatchDiv = document.getElementById('password-match');

        if (isSetupMode) {
            document.getElementById('page-title').textContent = 'Set your password';
            document.getElementById('page-subtitle').textContent = 'Create a password to secure your new Dip Finder account.';
            document.getElementById('btn-label').textContent = 'Set Password';
            document.querySelector('label[for="new-password"]').textContent = 'Choose a Password';
            document.title = 'Set Password - Dip Finder';
        }

        async function initializePage() {
            if (isSetupMode) {
                // Setup mode: token is self-contained JWT, no server round-trip needed
                return;
            }
            if (!resetToken) {
                showError('Invalid or missing reset token. Please request a new password reset.');
                form.classList.add('hidden');
                return;
            }
            await verifyToken();
        }

        async function verifyToken() {
            try {
                showLoading('Verifying reset link...');
                const response = await fetch('/api/user?action=verify-reset-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken })
                });
                const data = await response.json();
                if (response.ok && data.valid) {
                    loadingDiv.classList.add('hidden');
                    if (!data.canResetNow) {
                        const waitTime = data.waitTimeMinutes || 5;
                        showError(`Password was recently changed. Please wait ${waitTime} more minute${waitTime !== 1 ? 's' : ''} before resetting again.`);
                        form.classList.add('hidden');
                        addBackButton();
                        return false;
                    }
                    window.history.replaceState({}, document.title, window.location.pathname);
                    document.getElementById('static-back-button').style.display = 'none';
                    return true;
                } else {
                    showError(data.error || 'This password reset link is invalid or has already been used. Please request a new password reset.');
                    form.classList.add('hidden');
                    addBackButton();
                    return false;
                }
            } catch (error) {
                showError('Network error. Please check your connection and try again.');
                form.classList.add('hidden');
                addBackButton();
                return false;
            }
        }

        function addBackButton() {
            if (window.resetWasSuccessful) return;
            const existing = document.querySelector('.back-button-container');
            if (existing) existing.remove();
            document.getElementById('static-back-button').style.display = 'none';
            const el = document.createElement('div');
            el.className = 'back-button-container text-center mt-2';
            el.innerHTML = `<a href="/app" class="text-sm text-gray-400 transition hover:text-gray-600"><i class="fas fa-arrow-left mr-1 text-xs"></i>Back to sign in</a>`;
            document.querySelector('.reset-container').appendChild(el);
        }

        initializePage();

        function checkPasswordStrength(password) {
            const criteria = [
                { test: /.{8,}/ },
                { test: /[a-z]/ },
                { test: /[A-Z]/ },
                { test: /\d/ },
                { test: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/ }
            ];
            const passed = criteria.filter(c => c.test.test(password)).length;
            if (password.length === 0) { passwordStrengthDiv.classList.add('hidden'); return false; }
            passwordStrengthDiv.classList.remove('hidden');
            if (passed < 3) { passwordStrengthDiv.textContent = 'Weak password'; passwordStrengthDiv.className = 'strength-weak'; }
            else if (passed < 5) { passwordStrengthDiv.textContent = 'Medium password'; passwordStrengthDiv.className = 'strength-medium'; }
            else { passwordStrengthDiv.textContent = 'Strong password'; passwordStrengthDiv.className = 'strength-strong'; }
            return passed >= 3;
        }

        function checkPasswordMatch() {
            const password = newPasswordInput.value;
            const repeat = repeatPasswordInput.value;
            if (repeat.length === 0) { passwordMatchDiv.classList.add('hidden'); return false; }
            passwordMatchDiv.classList.remove('hidden');
            if (password === repeat) {
                passwordMatchDiv.textContent = 'Passwords match';
                passwordMatchDiv.className = 'strength-strong';
                return true;
            } else {
                passwordMatchDiv.textContent = 'Passwords do not match';
                passwordMatchDiv.className = 'strength-weak';
                return false;
            }
        }

        function showError(message) {
            if (window.resetWasSuccessful) return;
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
            successDiv.classList.add('hidden');
            loadingDiv.classList.add('hidden');
        }

        function showSuccess(message) {
            window.resetWasSuccessful = true;
            if (message.includes('<a')) successText.innerHTML = message;
            else successText.textContent = message;
            successDiv.classList.remove('hidden');
            errorDiv.classList.add('hidden');
            loadingDiv.classList.add('hidden');
        }

        function showLoading(message) {
            loadingDiv.querySelector('span').textContent = message;
            loadingDiv.classList.remove('hidden');
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
        }

        newPasswordInput.addEventListener('input', function() {
            checkPasswordStrength(this.value);
            if (repeatPasswordInput.value) checkPasswordMatch();
        });
        repeatPasswordInput.addEventListener('input', checkPasswordMatch);

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            if (resetBtn.disabled) return;
            const password = newPasswordInput.value;
            const repeat = repeatPasswordInput.value;
            if (!password || !repeat) { showError('Please fill in both password fields.'); return; }
            if (password !== repeat) { showError('Passwords do not match.'); return; }
            if (!checkPasswordStrength(password)) { showError('Password does not meet security requirements.'); return; }

            let actionWasSuccessful = false;
            resetBtn.disabled = true;
            showLoading(isSetupMode ? 'Setting your password...' : 'Resetting your password...');

            try {
                let response, data;

                if (isSetupMode) {
                    response = await fetch('/api/user?action=set-initial-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token: setupToken, newPassword: password })
                    });
                    data = await response.json();

                    if (response.ok && data.token) {
                        actionWasSuccessful = true;
                        localStorage.setItem('token', data.token);
                        resetBtn.style.display = 'none';
                        form.style.pointerEvents = 'none';
                        showSuccess('Password set! Taking you to your dashboard...');
                        form.classList.add('hidden');
                        setTimeout(() => { window.location.replace('/app'); }, 2000);
                        return;
                    } else {
                        showError(data.error || 'Failed to set password. The link may have expired - please request a new one.');
                        if (!response.ok) { form.classList.add('hidden'); addBackButton(); }
                    }
                } else {
                    response = await fetch('/api/user?action=reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token: resetToken, newPassword: password })
                    });
                    data = await response.json();
                    const isSuccess = response.ok ||
                        (data?.message?.includes('successful')) ||
                        (response.status === 400 && data?.error?.includes('already been used'));

                    if (isSuccess) {
                        actionWasSuccessful = true;
                        resetBtn.style.display = 'none';
                        form.style.pointerEvents = 'none';
                        showSuccess(data.message || 'Password reset successful! Redirecting...');
                        form.classList.add('hidden');
                        setTimeout(() => { showLoading('Redirecting to sign in...'); }, 2000);
                        setTimeout(() => { window.location.replace('/app'); }, 3500);
                        return;
                    } else {
                        let msg = data.error || 'Failed to reset password. Please try again.';
                        if (response.status === 400 && data?.error?.includes('Invalid or expired')) {
                            form.classList.add('hidden');
                            addBackButton();
                        }
                        showError(msg);
                    }
                }
            } catch (error) {
                showError('Network error. Please try again.');
            } finally {
                if (!actionWasSuccessful) {
                    resetBtn.disabled = false;
                }
            }
        });
    </script>
</body>
</html>
